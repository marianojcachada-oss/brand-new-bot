<head>

<body>

<label>Notificar a</label>

<div id="notificar">

<label><input type="checkbox" value="PRINCIPALES"> PRINCIPALES</label><br>
<label><input type="checkbox" value="TAXIMETRO"> TAXIMETRO</label><br>
<label><input type="checkbox" value="MANAGERS"> MANAGERS</label><br>
<label><input type="checkbox" value="ADMINISTRACION"> ADMINISTRACION</label><br>

<input id="unidad" value="D">


<label>Nombre cliente</label>

<label>Teléfono cliente</label>
<input id="telefono_cliente">


<label>N° Servicio</label>
<input id="numero_servicio" value="S/N">


<label>Observación</label>
<textarea id="observacion"></textarea>


<button onclick="enviarReporte()">
Enviar Reporte
</button>

</div>



<script>

const WEBHOOK="PEGAR_AQUI_WEBHOOK_POWER_AUTOMATE";

async function enviarReporte(){

const notificarSelect=document.getElementById("notificar");

const notificar=[...notificarSelect.selectedOptions]
.map(o=>o.value)
.join(",");


const data={

categoria:document.getElementById("categoria").value,
monto:document.getElementById("monto").value,
tipo_multa:document.getElementById("tipo_multa").value,
notificar:notificar,
unidad:document.getElementById("unidad").value,
nombre_cliente:document.getElementById("nombre_cliente").value,
telefono_cliente:document.getElementById("telefono_cliente").value,
numero_servicio:document.getElementById("numero_servicio").value,
observacion:document.getElementById("observacion").value,

usuario:"Operador Teams",
action:"submitReporte",
fecha:new Date().toISOString()

};

await fetch(WEBHOOK,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

alert("✅ Reporte enviado");

}

</script>

  <script>

const categoria = document.getElementById("categoria");

const numero_servicio = document.getElementById("numero_servicio");
const notificar = document.getElementById("notificar");
const nombre_cliente = document.getElementById("nombre_cliente");
const telefono_cliente = document.getElementById("telefono_cliente");

const monto = document.getElementById("monto");
const tipoMulta = document.getElementById("tipo_multa");
const unidad = document.getElementById("unidad");
const observacion = document.getElementById("observacion");

function limpiarCampos(){
  [
    numero_servicio,
    notificar,
    nombre_cliente,
    telefono_cliente,
    monto,
    tipoMulta,
    unidad,
    observacion
  ].forEach(c=>{
    if(c){
      c.classList.remove("requerido");
    }
  });
}

categoria.addEventListener("change",function(){

  limpiarCampos();

  const valor = this.value;

  /* DEUDA */
  if(valor === "Deuda"){
    numero_servicio.classList.add("requerido");
    notificar.classList.add("requerido");
    nombre_cliente.classList.add("requerido");
    telefono_cliente.classList.add("requerido");
    monto.classList.add("requerido");
    unidad.classList.add("requerido");
    observacion.classList.add("requerido");
  }

  /* SALDO A FAVOR */
  if(valor === "Saldo a favor"){
    numero_servicio.classList.add("requerido");
    notificar.classList.add("requerido");
    nombre_cliente.classList.add("requerido");
    telefono_cliente.classList.add("requerido");
    monto.classList.add("requerido");
    unidad.classList.add("requerido");
    observacion.classList.add("requerido");
  }

  /* WARNING */
  if(valor === "Warning"){
    numero_servicio.classList.add("requerido");
    unidad.classList.add("requerido");
    observacion.classList.add("requerido");
  }

  /* MULTA */
  if(valor === "Multa"){
    numero_servicio.classList.add("requerido");
    tipoMulta.classList.add("requerido");
    notificar.classList.add("requerido");
    nombre_cliente.classList.add("requerido");
    telefono_cliente.classList.add("requerido");
    unidad.classList.add("requerido");
    observacion.classList.add("requerido");
  }

  /* LLANTA PINCHADA */
  if(valor === "Llanta pinchada"){
    numero_servicio.classList.add("requerido");
    unidad.classList.add("requerido");
  }

  /* PENDIENTE DE CIERRE */
  if(valor === "Pendiente de cierre"){
    numero_servicio.classList.add("requerido");
    notificar.classList.add("requerido");
    nombre_cliente.classList.add("requerido");
    telefono_cliente.classList.add("requerido");
    unidad.classList.add("requerido");
    observacion.classList.add("requerido");
  }

});

</script>
  
</body>
</html>
