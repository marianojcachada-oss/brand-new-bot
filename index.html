<head>
<meta charset="UTF-8">
<title>TaxiLaser Reportes</title>

<link rel="stylesheet" href="styles.css">

</head>


<body>

<div class="container">

<div class="header">
<div class="logo">🚕</div>
<div class="title">
<h1>TaxiLaser</h1>
<span>Sistema de reportes operativos</span>
</div>
</div>

<div class="note">
Campos importantes:<br>
Multa → Tipo de multa + Unidad + Observación<br>
Deuda / Saldo → Monto + Unidad
</div>

<label>Categoría</label>
<select id="categoria">

<option>Deuda</option>
<option>Saldo a favor</option>
<option>Warning</option>
<option>Multa</option>
<option>Llanta pinchada</option>
<option>PendienteRevision</option>

</select>


<label>Monto</label>
<input id="monto" placeholder="$0">


<label>Tipo de multa</label>
<select id="tipo_multa">

<option value="">Seleccionar</option>

<option value="1060DF|Documentación falsa o alterada|300">
Adulteramiento de documentación - $300
</option>

<option value="1060CA|Ceder el app a un tercero|500">
Ceder el app a un tercero - $500
</option>

<option value="1060VNR|Vehículo distinto|100">
Vehículo distinto - $100
</option>

<option value="1060VS|Vehículo sucio|20">
Vehículo sucio - $20
</option>

<option value="1060RC|Reclamo cliente|20">
Reclamo cliente - $20
</option>

</select>


<label>Notificar a</label>

<div id="notificar">

<label><input type="checkbox" value="PRINCIPALES"> PRINCIPALES</label><br>
<label><input type="checkbox" value="TAXIMETRO"> TAXIMETRO</label><br>
<label><input type="checkbox" value="MANAGERS"> MANAGERS</label><br>
<label><input type="checkbox" value="ADMINISTRACION"> ADMINISTRACION</label><br>
<label><input type="checkbox" value="SUPERVISORES"> SUPERVISORES</label><br>
<label><input type="checkbox" value="REPORTES"> REPORTES</label>

</div>



<label>Unidad</label>
<input id="unidad" value="D">


<label>Nombre cliente</label>
<input id="nombre_cliente">


<label>Teléfono cliente</label>
<input id="telefono_cliente">


<label>N° Servicio</label>
<input id="numero_servicio" value="S/N">


<label>Observación</label>
<textarea id="observacion"></textarea>


<button onclick="enviarReporte()">
Enviar Reporte
</button>

</div>



<script>

const WEBHOOK="PEGAR_AQUI_WEBHOOK_POWER_AUTOMATE";

async function enviarReporte(){

const notificarSelect=document.getElementById("notificar");

const notificar=[...notificarSelect.selectedOptions]
.map(o=>o.value)
.join(",");


const data={

categoria:document.getElementById("categoria").value,
monto:document.getElementById("monto").value,
tipo_multa:document.getElementById("tipo_multa").value,
notificar:notificar,
unidad:document.getElementById("unidad").value,
nombre_cliente:document.getElementById("nombre_cliente").value,
telefono_cliente:document.getElementById("telefono_cliente").value,
numero_servicio:document.getElementById("numero_servicio").value,
observacion:document.getElementById("observacion").value,

usuario:"Operador Teams",
action:"submitReporte",
fecha:new Date().toISOString()

};

await fetch(WEBHOOK,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

alert("✅ Reporte enviado");

}

</script>

</body>
</html>
